name: Menu-Gruppe
icon: list-bullet
label: '{{ title }}'
wysiwyg: true

fields:
    title:
        type: text
        label: Gruppenbezeichnung
        required: true
    linktitle:
        type: text
        label: Link
        help: Link-Ziel, auf den die Überschrift der Gruppe verlinkt. Wenn leer, wird die Überschrift nicht verlinkt.
    entries:
        type: blocks
        label: Einträge
        fieldsets:
            - menuentry
